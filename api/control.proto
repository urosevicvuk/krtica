syntax = "proto3";

package krtica.v1;

option go_package = "github.com/urosevicvuk/krtica/internal/wire/pb";

enum StreamKind {
  STREAM_KIND_UNSPECIFIED = 0;
  STREAM_KIND_CONTROL = 1;
  STREAM_KIND_DATA = 2;
}
message Hello {
  uint32 protocol_version = 1;
  string agent_name = 2;
  string token = 3;
  repeated string services = 4;
}

message HelloAck {
  bool ok = 1;
  string error = 2;
}

message StreamHeader {
  string service = 1;
  StreamKind kind = 2;
}

message Ping {
  uint64 sequence = 1;
}

message Pong {
  uint64 sequence = 1;
}

