# All steps run inside the flake dev shell: CI uses byte-identical tool
# versions to local dev (flake.lock is the single source of truth).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: format check
        run: nix develop -c golangci-lint fmt --diff

      - name: lint
        run: nix develop -c golangci-lint run

      - name: build
        run: nix develop -c go build ./...

      # -race: krtica is goroutines all the way down; the race detector in CI
      # is a hard gate, not a nicety (P1).
      - name: test
        run: nix develop -c go test -race ./...
